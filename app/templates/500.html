{% extends "base.html" %}
{% block content %}
    <div class="flex min-h-[60vh] flex-col items-center justify-center text-center">
        <div class="rounded-2xl border border-gray-200 dark:border-gray-800 bg-white dark:bg-gray-900 p-8 shadow-sm">
            <h1 class="mb-3 text-5xl font-bold text-osu-navy dark:text-osu-blue-light">
                500
            </h1>
            <p class="mb-2 text-lg font-semibold text-gray-900 dark:text-gray-100">

            </p>
            <p class="mb-6 max-w-md text-sm text-gray-600 dark:text-gray-300">

            </p>
            <a href="{{ url_for('views.index') }}"
