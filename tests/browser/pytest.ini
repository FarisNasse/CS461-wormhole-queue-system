# tests/browser/pytest.ini
[pytest]
# Run only the browser/ sub-package by default when invoked from this directory.
testpaths = .
asyncio_mode = auto

# Markers used in browser tests
markers =
    perf: performance / timing assertions
    a11y: accessibility (axe-core / structural) checks
    ux:   end-to-end user-journey flows
    slow: tests that wait for JS polling cycles (>5 s)
