# Nginx server config for Wormhole Queue System
# Replace ec2-100-23-128-50.us-west-2.compute.amazonaws.com with your real domain.

server {
    listen 80;
    listen [::]:80;
    server_name ec2-100-23-128-50.us-west-2.compute.amazonaws.com;

    # Redirect all HTTP traffic to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name ec2-100-23-128-50.us-west-2.compute.amazonaws.com;

    # Certbot-managed certificate paths
    ssl_certificate /etc/letsencrypt/live/ec2-100-23-128-50.us-west-2.compute.amazonaws.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ec2-100-23-128-50.us-west-2.compute.amazonaws.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Keep uploads and headers bounded
    client_max_body_size 10m;

    # Compress HTML, CSS, JS, and JSON responses before sending them to browsers.
    # This improves Lighthouse's document/CSS/JS transfer-size diagnostics in production.
    gzip on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_vary on;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # Socket.IO endpoint (WebSocket + long polling)
    location /socket.io/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_buffering off;
    }

    # All other Flask routes
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }
}
